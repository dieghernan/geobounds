url: https://dieghernan.github.io/geobounds

figures:
  dpi: 300
  fig.retina: 2

development:
  mode: auto

repo:
  branch: main

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: 'G-LTNVYVLK36'
  opengraph:
    twitter:
      creator: "@dhernangomez"
      card: summary_large_image

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  William and Mary geoLab:
    href: https://sites.google.com/view/wmgeolab/

navbar:
  structure:
    right: [search, github, geoBoundaries, lightswitch]
  components:
    geoBoundaries:
      icon: fa-earth-americas
      href: https://www.geoboundaries.org/
      aria-label: geoBoundaries

home:
  title: geobounds | Download administrative boundary data from geoBoundaries
  description: |
    geobounds is an R package for retrieving individual country files and
    D. et al. (2020) geoBoundaries: A global database of political
    global composite files from geoBoundaries as sf objects. See Runfola,
    administrative boundaries. PLOS ONE 15(4): e0231866.
    https://doi.org/10.1371/journal.pone.0231866

reference:
- title: Boundaries
  desc: >
    Download individual country files or global composite files as
    <a href="https://CRAN.R-project.org/package=sf"
    class="external-link"><span class="pkg">sf</span></a> objects.
- contents:
  - has_concept("API functions")
- title: Metadata
  desc: >
    Inspect available ADM levels, boundary metadata and source details.
- contents:
  - has_concept("metadata functions")
- title: Cache management
  desc: >
    Configure, inspect and clear the local cache used for downloaded boundary
    files.
- contents:
  - has_concept("cache utilities")
- title: About the package
- contents:
  - geobounds-package

articles:
- title: First steps
  contents:
  - geobounds
- title: geoBoundaries coverage
  navbar: geoBoundaries coverage
  desc: >
    Compare highest available ADM levels and metadata for the **geoBoundaries**
    release types available through geobounds.
  contents:
  - articles/gbopen
  - articles/gbhumanitarian
  - articles/gbauthoritative
- title: From the blog
  navbar: Blog posts
  desc: >
    Blog posts tagged with **geobounds** on One World.
  contents:
  - blog-introducing-geobounds

external-articles:
- name: blog-introducing-geobounds
  title: "Introducing geobounds"
  description: "A simple way to retrieve datasets from geoBoundaries"
  href: https://dieghernan.github.io/202602_geobounds/
