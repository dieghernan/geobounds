url: https://dieghernan.github.io/geobounds

figures:
  dpi: 300
  fig.retina: 2

development:
  mode: auto

repo:
  branch: main

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: 'G-LTNVYVLK36'
  opengraph:
    twitter:
      creator: "@dhernangomez"
      card: summary_large_image

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  William and Mary geoLab:
    href: https://sites.google.com/view/wmgeolab/

navbar:
  structure:
    right: [search, github, geoBoundaries, lightswitch]
  components:
    geoBoundaries:
      icon: fa-earth-americas
      href: https://www.geoboundaries.org/
      aria-label: geoBoundaries

home:
  title: geobounds | Download administrative boundary data from geoBoundaries
  description: >
    Download individual country files and global composite files from
    geoBoundaries as sf objects for mapping and spatial analysis.

reference:
- title: Boundary data
  desc: >
    Download individual country files and global composite files as
    [**sf**](https://r-spatial.github.io/sf/) objects.
- contents:
  - has_concept("api")
- title: Availability and metadata
  desc: >
    Inspect available ADM levels, boundary metadata and source information.
- contents:
  - has_concept("metadata")
- title: Cache management
  desc: >
    Configure, inspect and clear the local cache used for downloaded boundary
    files.
- contents:
  - has_concept("cache")
- title: About the package
- contents:
  - geobounds-package

articles:
- title: Get started
  desc: >
    Learn how to download, inspect and map administrative boundary data.
  contents:
  - geobounds
- title: Coverage by release type
  navbar: Release coverage
  desc: >
    Compare highest available ADM levels and boundary metadata for the
    **geoBoundaries** release types available through geobounds.
  contents:
  - articles/gbopen
  - articles/gbhumanitarian
  - articles/gbauthoritative
- title: From the blog
  navbar: Blog posts
  desc: >
    Blog posts tagged with **geobounds** on One World.
  contents:
  - blog-introducing-geobounds

external-articles:
- name: blog-introducing-geobounds
  title: "Introducing geobounds"
  description: "Download administrative boundary data from geoBoundaries"
  href: https://dieghernan.github.io/202602_geobounds/
