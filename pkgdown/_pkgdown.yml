url: https://dieghernan.github.io/geobounds

figures:
  dpi: 300
  fig.retina: 2

development:
  mode: auto

repo:
  branch: main

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: 'G-LTNVYVLK36'
  opengraph:
    twitter:
      creator: "@dhernangomez"
      card: summary_large_image

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  William and Mary geoLab:
    href: https://sites.google.com/view/wmgeolab/

navbar:
  structure:
    right: [search, github, geoBoundaries, lightswitch]
  components:
    geoBoundaries:
      icon: fa-earth-americas
      href: https://www.geoboundaries.org/
      aria-label: geoBoundaries

home:
  title: geobounds | Download administrative boundary data from geoBoundaries
  description: >
    Download individual country boundaries and global composite boundaries
    from geoBoundaries as sf objects for mapping and spatial analysis.

reference:
- title: Download boundaries
  desc: >
    Download individual country boundaries and global composite boundaries as
    [**sf**](https://r-spatial.github.io/sf/) objects.
- contents:
  - has_concept("api")
- title: Inspect metadata and availability
  desc: >
    Inspect boundary metadata, available ADM levels and source information.
- contents:
  - has_concept("metadata")
- title: Manage the cache
  desc: >
    Configure, inspect and clear cached boundary files.
- contents:
  - has_concept("cache")
- title: Learn about geobounds
- contents:
  - geobounds-package

articles:
- title: Get started
  desc: >
    Learn to download, inspect and map administrative boundary data.
  contents:
  - geobounds
- title: Release coverage
  navbar: Release coverage
  desc: >
    Compare ADM-level availability and boundary metadata across
    **geoBoundaries** release types.
  contents:
  - articles/gbopen
  - articles/gbhumanitarian
  - articles/gbauthoritative
- title: From the blog
  navbar: Blog posts
  desc: >
    Read One World posts about **geobounds**.
  contents:
  - blog-introducing-geobounds

external-articles:
- name: blog-introducing-geobounds
  title: "Introducing geobounds"
  description: "Download administrative boundary data from geoBoundaries"
  href: https://dieghernan.github.io/202602_geobounds/
